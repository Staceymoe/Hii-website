<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Earth from space</title>
  <desc id="desc">A stylized globe with blue atmospheric glow, land masses, clouds, and a bright horizon flare.</desc>
  <defs>
    <radialGradient id="spaceGlow" cx="64%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#3048b8" stop-opacity="0.42"/>
      <stop offset="45%" stop-color="#0d1635" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ocean" cx="62%" cy="36%" r="64%">
