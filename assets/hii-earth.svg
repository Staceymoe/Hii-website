      <stop offset="30%" stop-color="#064886"/>
      <stop offset="61%" stop-color="#05234e"/>
      <stop offset="100%" stop-color="#01040b"/>
    </radialGradient>
    <radialGradient id="shade" cx="70%" cy="25%" r="65%">
